name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Run backend unit tests
        run: npm test -- --coverage
      - name: Build backend
        run: npm run build
      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/lcov.info
          flags: backend
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
      - name: Install root Playwright dependencies
        run: npm ci
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Prepare Docker env files
        run: |
          echo "POSTGRES_PASSWORD=ahso_dev_password" > .env
          cp backend/.env.example backend/.env
          cp frontend/.env.local.example frontend/.env.local
      - name: Start application stack
        run: docker compose up -d --build postgres redis backend frontend
      - name: Seed database
        run: docker compose exec -T backend npm run prisma:seed
      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            curl -sf http://127.0.0.1:3000/login >/dev/null && exit 0
            sleep 5
          done
          echo "Frontend did not become ready in time"
          exit 1
      - name: Run Playwright smoke tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
