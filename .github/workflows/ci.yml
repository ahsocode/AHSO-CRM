name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:

# Cancel any in-progress run for the same branch when a new push comes in
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    # Only run when backend files changed (or on main for safety)
    if: >
      github.ref == 'refs/heads/main' ||
      contains(toJson(github.event.commits), '"backend/') ||
      contains(toJson(github.event.head_commit.modified), 'backend/') ||
      github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend dependencies
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Lint backend
        run: npm run lint
      - name: Typecheck backend
        run: npm run typecheck
      - name: Run backend unit tests
        run: npm test -- --coverage
      - name: Build backend
        run: npm run build
      - name: Upload backend coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/lcov.info
          flags: backend
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Run frontend unit tests
        run: npm run test:unit
      - name: Build frontend
        run: npm run build

  # E2E only runs on main — it's the slowest job (~10 min) and isn't worth
  # running on every feature branch push
  e2e:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      # Do not use actions/cache or type=gha Docker layer cache here.
      # The organization has a very small Actions storage quota; BuildKit GHA
      # cache alone can grow past it after a few runs.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare env files
        run: |
          echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)" > .env
          cp backend/.env.example backend/.env
          cp frontend/.env.local.example frontend/.env.local
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: ahso-crm-backend:latest
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: ahso-crm-frontend:latest
      # Images are pre-built above with exactly the names docker-compose.yml expects,
      # so --no-build ensures compose uses them directly without re-building
      - name: Start stack
        run: docker compose up -d --no-build postgres redis backend frontend
      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            curl -sf http://127.0.0.1:3001/api/health >/dev/null && exit 0
            sleep 5
          done
          echo "Backend health endpoint did not become ready" && exit 1
      - name: Seed database
        run: docker compose exec -T backend npm run prisma:seed
      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            curl -sf http://127.0.0.1:3000/login >/dev/null && exit 0
            sleep 5
          done
          echo "Frontend did not become ready" && exit 1
      - name: Run Playwright smoke tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 3
