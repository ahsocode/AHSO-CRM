name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

# Only one deploy runs at a time; a second push will wait, not cancel
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ahso-crm-backend
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/ahso-crm-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          PROD_PUBLIC_API_URL: ${{ secrets.PROD_PUBLIC_API_URL }}
        run: |
          missing=0
          for name in PROD_HOST PROD_USER PROD_SSH_KEY PROD_APP_DIR PROD_PUBLIC_API_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for production deploy"
              missing=1
            fi
          done
          exit "$missing"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          # Reuse layers from the previous build — the node_modules and build
          # layers stay cached as long as package-lock.json and source files
          # haven't changed, cutting build time from ~5 min to ~30 s on code-only pushes
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:cache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_NAME=AHSO CRM
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:cache,mode=max

      - name: Deploy on production server
        uses: appleboy/ssh-action@v1.2.0
        env:
          PROD_GHCR_USERNAME: ${{ secrets.PROD_GHCR_USERNAME }}
          PROD_GHCR_TOKEN: ${{ secrets.PROD_GHCR_TOKEN }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: PROD_GHCR_USERNAME,PROD_GHCR_TOKEN
          script: |
            set -euo pipefail
            cd ${{ secrets.PROD_APP_DIR }}

            print_disk_usage() {
              echo "[deploy] Disk usage: $1"
              df -h / /var/lib/docker /var/lib/containerd 2>/dev/null || df -h /
              docker system df || true
            }

            cleanup_docker_space() {
              echo "[deploy] Pruning unused Docker data before pulling images."
              echo "[deploy] Volumes are intentionally preserved for Postgres, Redis and uploads."
              docker container prune -f || true
              docker image prune -af || true
              docker builder prune -af || true
              docker network prune -f || true
              print_disk_usage "after cleanup"
            }

            COMPOSE="docker compose --env-file .env.production.local -f docker-compose.prod.yml"
            BACKEND_ENV_FILE="backend/.env.production.local"

            read_env_from_file() {
              local file="$1"
              local key="$2"
              grep -E "^[[:space:]]*$key=" "$file" 2>/dev/null | tail -n 1 | cut -d= -f2- | sed -E "s/^[\"']//; s/[\"']$//"
            }

            upsert_env_value() {
              local file="$1"
              local key="$2"
              local value="$3"
              if grep -Eq "^[[:space:]]*$key=" "$file"; then
                tmp_file="$(mktemp)"
                awk -v key="$key" -v value="$value" '
                  BEGIN { replaced = 0 }
                  $0 ~ "^[[:space:]]*" key "=" {
                    print key "=\"" value "\""
                    replaced = 1
                    next
                  }
                  { print }
                  END {
                    if (!replaced) {
                      print key "=\"" value "\""
                    }
                  }
                ' "$file" > "$tmp_file"
                mv "$tmp_file" "$file"
              else
                printf '\n%s="%s"\n' "$key" "$value" >> "$file"
              fi
            }

            ensure_generated_backend_secret() {
              local key="$1"
              local current_value
              current_value="$(read_env_from_file "$BACKEND_ENV_FILE" "$key")"
              if [ -n "$current_value" ] && [[ "$current_value" != *"replace-with"* && "$current_value" != *"change-me"* ]]; then
                return
              fi

              echo "[deploy] $key is missing or placeholder in $BACKEND_ENV_FILE; generating a persistent value."
              upsert_env_value "$BACKEND_ENV_FILE" "$key" "$(openssl rand -hex 32)"
            }

            print_disk_usage "before cleanup"
            if [ -n "${PROD_GHCR_TOKEN:-}" ]; then
              echo "$PROD_GHCR_TOKEN" | docker login ghcr.io -u "${PROD_GHCR_USERNAME:-${{ github.actor }}}" --password-stdin
            fi
            ensure_generated_backend_secret "JWT_REFRESH_SECRET"
            ensure_generated_backend_secret "JWT_RESET_SECRET"
            ensure_generated_backend_secret "ENCRYPTION_KEY"
            ./scripts/check-deploy-readiness.sh
            cleanup_docker_space
            if ! $COMPOSE pull backend frontend; then
              echo "[deploy] Pull failed. Running one more cleanup pass and retrying once."
              cleanup_docker_space
              $COMPOSE pull backend frontend
            fi
            # Apply pending Prisma migrations before bringing up the new containers.
            # --no-deps prevents accidentally re-creating postgres/redis; they are
            # already running from previous deploys or started implicitly by compose.
            echo "[deploy] Starting postgres/redis if not already running..."
            $COMPOSE up -d postgres redis
            echo "[deploy] Waiting for postgres to be ready..."
            timeout 90 bash -c "until $COMPOSE exec -T postgres pg_isready -U \${POSTGRES_USER:-ahso} -d \${POSTGRES_DB:-ahso_crm} 2>/dev/null; do sleep 3; done"
            echo "[deploy] Running Prisma migrations..."
            $COMPOSE run --rm --no-deps backend npm run prisma:deploy

            if ! $COMPOSE up -d --remove-orphans --wait --timeout 120; then
              echo "[deploy] docker compose failed to reach healthy state. Recent service logs:"
              $COMPOSE ps || true
              $COMPOSE logs --tail=200 backend frontend postgres redis || true
              exit 1
            fi
            $COMPOSE ps
            cleanup_docker_space
            read_env() {
              grep -E "^[[:space:]]*$1=" .env.production.local | tail -n 1 | cut -d= -f2- | sed -E "s/^[\"']//; s/[\"']$//"
            }
            BACKEND_BIND="$(read_env BACKEND_BIND)"
            FRONTEND_BIND="$(read_env FRONTEND_BIND)"
            BACKEND_PROBE_BIND="${BACKEND_BIND:-127.0.0.1:3001}"
            FRONTEND_PROBE_BIND="${FRONTEND_BIND:-127.0.0.1:3000}"
            if ! curl -fsS "http://127.0.0.1:${BACKEND_PROBE_BIND##*:}/api/health" >/dev/null; then
              echo "[deploy] Backend health probe failed after compose reported healthy. Recent backend logs:"
              $COMPOSE logs --tail=200 backend || true
              exit 1
            fi
            if ! curl -fsS "http://127.0.0.1:${FRONTEND_PROBE_BIND##*:}/login" >/dev/null; then
              echo "[deploy] Frontend probe failed after compose reported healthy. Recent frontend logs:"
              $COMPOSE logs --tail=200 frontend || true
              exit 1
            fi

      - name: Notify Slack success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"AHSO CRM deploy thành công cho branch main."}' \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"AHSO CRM deploy thất bại. Vui lòng kiểm tra GitHub Actions."}' \
            "$SLACK_WEBHOOK_URL"
